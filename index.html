<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendario de Clientes</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f7f4ee;--card:#fff;--border:#e4d7c8;--brand:#9b6733;--dark:#2b2520;--muted:#74695f;--red:#c22b23;--green:#55c980;--yellow:#ffd35c;--purple:#c9b5e8}
    *{box-sizing:border-box}body{margin:0;font-family:Arial, sans-serif;background:var(--bg);color:#201b17}.top{background:#2b2520;color:#fff;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}.top h1{margin:0;font-size:26px}.top p{margin:5px 0 0}.month{display:flex;align-items:center;gap:8px}.month input{font-size:16px;padding:10px;border-radius:8px;border:0}.wrap{padding:22px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;box-shadow:0 2px 6px #0001}.card .num{font-size:28px;font-weight:bold;margin-top:8px}.layout{display:grid;grid-template-columns:360px 1fr;gap:18px}.panel{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;box-shadow:0 2px 6px #0001}input,select,button{font:inherit}input,select{padding:11px;border:1px solid var(--border);border-radius:8px;background:#fff}button{padding:10px 14px;border:0;border-radius:8px;background:var(--brand);color:#fff;font-weight:bold;cursor:pointer}button.danger{background:var(--red)}button.light{background:#eee;color:#222}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.full{grid-column:1/-1}.client{border:1px solid var(--border);border-radius:10px;padding:10px;margin:8px 0;cursor:pointer}.client.active{outline:2px solid var(--brand)}.muted{color:var(--muted);font-size:13px}.badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:bold;margin-right:6px}.pendiente{background:#e9e2d8}.proceso{background:#ffe08a}.completada{background:#bce8c8}.observada{background:#ffb3a9}.dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;vertical-align:-1px}.task{display:grid;grid-template-columns:1.4fr 160px 1fr 86px;gap:8px;align-items:center;border:1px solid var(--border);border-radius:10px;padding:10px;margin:8px 0}.task strong{display:block}.due{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:bold}.due.ok{background:#bdecc5}.due.warn{background:#ffe08a}.due.over{background:#ffb3a9}.general table{width:100%;border-collapse:collapse}.general th,.general td{border:1px solid var(--border);padding:9px;text-align:left}.status-cell{font-size:22px;text-align:center!important;cursor:pointer}.tabs{display:flex;gap:8px;margin-bottom:14px}.tabs button{background:#e8ddd0;color:#2b2520}.tabs button.active{background:var(--brand);color:white}.hidden{display:none}.urgent{border-left:6px solid var(--red);padding-left:10px}.payrow{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid var(--border);border-radius:10px;padding:10px}.small{font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap}.archived{opacity:.75}@media(max-width:900px){.cards{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}.task{grid-template-columns:1fr}.top{display:block}.month{margin-top:12px}}
  </style>
</head>
<body>
<header class="top"><div><h1>Calendario de Clientes</h1><p>Clientes, tareas, estados y honorarios compartidos</p></div><div class="month"><label>Mes</label><input id="month" type="month"></div></header>
<div class="wrap">
  <div class="tabs"><button id="tabDashboard" class="active">Inicio</button><button id="tabGeneral">Vista general</button><button id="tabArchived">Archivados</button></div>
  <section id="dashboard">
    <div class="cards"><div class="card">Pendientes<div class="num" id="cPend">0</div></div><div class="card">En proceso<div class="num" id="cProc">0</div></div><div class="card">Completadas<div class="num" id="cComp">0</div></div><div class="card">Observadas<div class="num" id="cObs">0</div></div><div class="card">Honorarios pendientes<div class="num" id="cFees">$ 0</div></div></div>
    <div class="panel" style="margin-bottom:18px"><h2>Hoy / urgentes</h2><div id="urgentList"></div></div>
    <div class="panel" style="margin-bottom:18px"><h2>Clientes con pendientes del mes</h2><button id="genMonth" style="float:right;margin-top:-45px">Generar tareas del mes</button><div id="clientSummary"></div></div>
  </section>
  <section id="general" class="panel general hidden"><h2>Vista general tipo Excel</h2><div id="generalTable"></div></section>
  <section id="archived" class="panel hidden"><h2>Clientes archivados</h2><div id="archivedList"></div></section>
  <div class="layout">
    <aside class="panel"><h2>Clientes</h2><div class="grid2"><input id="newName" placeholder="Nombre del cliente"><input id="newType" placeholder="Tipo empresa"><input id="newFee" placeholder="Honorario" type="number"><select id="newCurr"><option>$</option><option>USD</option></select><button id="addClient" class="full">Agregar cliente</button></div><div id="clients"></div></aside>
    <main class="panel"><div id="detail"><p>Seleccioná un cliente.</p></div></main>
  </div>
</div>
<script>
const SUPABASE_URL='https://fadxutdctgldpislzmgi.supabase.co';
const SUPABASE_KEY='sb_publishable_I1OK75QI1mcOAJQAS50HRA_w5iemMz5';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const statusCycle=['pendiente','proceso','completada','observada'];
const statusLabel={pendiente:'Pendiente',proceso:'En proceso',completada:'Completada',observada:'Observada'};
const statusEmoji={pendiente:'⚪',proceso:'🟡',completada:'🟢',observada:'🔴'};
let state={clients:[],recurring:[],tasks:[],fees:[],deleted:[],selected:null};
const $=id=>document.getElementById(id);
function ymDate(){return $('month').value || new Date().toISOString().slice(0,7)}
function monthStart(){return ymDate()+'-01'}
function fmtMoney(n,c='$'){return `${c} ${Number(n||0).toLocaleString('es-UY')}`}
function daysTo(date){let a=new Date(new Date().toISOString().slice(0,10)); let b=new Date(date); return Math.ceil((b-a)/86400000)}
function dueClass(d,s){if(s==='completada')return 'ok';let n=daysTo(d); if(n<0)return 'over'; if(n<=5)return 'warn'; return 'ok'}
function applies(rec, ym){ if(!rec.start_month) return true; const [y,m]=ym.split('-').map(Number); const [sy,sm]=rec.start_month.split('-').map(Number); const diff=(y-sy)*12+(m-sm); if(diff<0) return false; const f=rec.frequency||'mensual'; const map={mensual:1,bimensual:2,trimestral:3,semestral:6,anual:12}; return diff%(map[f]||1)===0; }
async function load(autoGenerate=false){
  const [c,r,t,f,d]=await Promise.all([
    sb.from('clients').select('*').order('name'),
    sb.from('recurring_tasks').select('*').order('name'),
    sb.from('monthly_tasks').select('*').eq('month',monthStart()).order('due_date'),
    sb.from('monthly_fees').select('*').eq('month',monthStart()),
    sb.from('deleted_monthly_tasks').select('*').eq('month',monthStart())
  ]);
  state.clients=c.data||[]; state.recurring=r.data||[]; state.tasks=t.data||[]; state.fees=f.data||[]; state.deleted=d.data||[];
  if(autoGenerate){ await generateMonth(false); return; }
  render();
}
async function generateMonth(showAlert=true){
  const active=state.clients.filter(c=>!c.archived);
  let created=0;
  for(const cl of active){
    if(!state.fees.find(f=>f.client_id===cl.id)){
      await sb.from('monthly_fees').insert({client_id:cl.id,month:monthStart(),amount:cl.fee_amount||0,currency:cl.fee_currency||'$',paid_amount:0,status:'pendiente'});
      created++;
    }
    for(const rec of state.recurring.filter(r=>r.client_id===cl.id && !r.archived && applies(r,ymDate()))){
      const exists=state.tasks.find(t=>t.client_id===cl.id && t.recurring_task_id===rec.id);
      const wasDeleted=state.deleted.find(x=>x.client_id===cl.id && x.recurring_task_id===rec.id);
      if(!exists && !wasDeleted){
        const day=String(rec.due_day||25).padStart(2,'0');
        await sb.from('monthly_tasks').insert({client_id:cl.id,recurring_task_id:rec.id,month:monthStart(),name:rec.name,due_date:ymDate()+'-'+day,status:'pendiente'});
        created++;
      }
    }
  }
  await load(false);
  if(showAlert) alert(created ? 'Tareas del mes generadas/actualizadas.' : 'No había tareas nuevas para generar en este mes.');
}
function activeClients(){return state.clients.filter(c=>!c.archived)}
function render(){renderTabs();renderCards();renderClients();renderSummary();renderUrgent();renderDetail();renderGeneral();renderArchived();}
function renderTabs(){['Dashboard','General','Archived'].forEach(x=>{$('tab'+x).onclick=()=>{['dashboard','general','archived'].forEach(s=>$(s).classList.add('hidden'));$(x.toLowerCase()).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));$('tab'+x).classList.add('active')}})}
function renderCards(){let ts=state.tasks.filter(t=>activeClients().some(c=>c.id===t.client_id));$('cPend').textContent=ts.filter(t=>t.status==='pendiente').length;$('cProc').textContent=ts.filter(t=>t.status==='proceso').length;$('cComp').textContent=ts.filter(t=>t.status==='completada').length;$('cObs').textContent=ts.filter(t=>t.status==='observada').length;let total=state.fees.filter(f=>activeClients().some(c=>c.id===f.client_id)).reduce((a,f)=>a+Math.max(0,Number(f.amount||0)-Number(f.paid_amount||0)),0);$('cFees').textContent=fmtMoney(total)}
function renderClients(){$('clients').innerHTML=activeClients().map(c=>`<div class="client ${state.selected===c.id?'active':''}" onclick="selectClient('${c.id}')"><strong>${c.name}</strong><div class="muted">${c.company_type||''} · ${fmtMoney(c.fee_amount,c.fee_currency)}</div></div>`).join('')}
function renderSummary(){let html='<table style="width:100%;border-collapse:separate;border-spacing:0 8px"><tr><th>Cliente</th><th>Pend.</th><th>Proceso</th><th>Hechas</th><th>Obs.</th><th>Pago</th></tr>'; for(const c of activeClients()){let ts=state.tasks.filter(t=>t.client_id===c.id);let fee=state.fees.find(f=>f.client_id===c.id);let due=fee?Math.max(0,Number(fee.amount||0)-Number(fee.paid_amount||0)):Number(c.fee_amount||0);html+=`<tr class="client" onclick="selectClient('${c.id}')"><td><b>${c.name}</b><div class="muted">${c.company_type||''}</div></td><td>${ts.filter(t=>t.status==='pendiente').length}</td><td>${ts.filter(t=>t.status==='proceso').length}</td><td>${ts.filter(t=>t.status==='completada').length}</td><td>${ts.filter(t=>t.status==='observada').length}</td><td>${due<=0?'Pagado':fmtMoney(due,fee?.currency||c.fee_currency)}</td></tr>`} $('clientSummary').innerHTML=html+'</table>'}
function renderUrgent(){let arr=state.tasks.filter(t=>t.status!=='completada' && daysTo(t.due_date)<=5).sort((a,b)=>a.due_date.localeCompare(b.due_date));$('urgentList').innerHTML=arr.length?arr.map(t=>{let c=state.clients.find(c=>c.id===t.client_id);return `<div class="urgent"><b>${c?.name||''}</b> - ${t.name} <span class="due ${dueClass(t.due_date,t.status)}">Vence: ${t.due_date}</span></div>`}).join('<hr>'):'<p class="muted">No hay tareas urgentes.</p>'}
function renderDetail(){let c=state.clients.find(c=>c.id===state.selected); if(!c){$('detail').innerHTML='<p>Seleccioná un cliente.</p>';return} let tasks=state.tasks.filter(t=>t.client_id===c.id); let recs=state.recurring.filter(r=>r.client_id===c.id&&!r.archived); let fee=state.fees.find(f=>f.client_id===c.id); let due=fee?Math.max(0,Number(fee.amount||0)-Number(fee.paid_amount||0)):Number(c.fee_amount||0);
$('detail').innerHTML=`<h2>${c.name}</h2><p class="muted">${c.company_type||''}</p><p><span class="badge pendiente"><span class="dot" style="background:var(--purple)"></span>Pendiente</span><span class="badge proceso"><span class="dot" style="background:var(--yellow)"></span>En proceso</span><span class="badge completada"><span class="dot" style="background:var(--green)"></span>Completada</span><span class="badge observada"><span class="dot" style="background:#e94d64"></span>Observada</span></p><h3>Tareas del mes</h3>${tasks.map(taskHtml).join('')||'<p class="muted">Sin tareas este mes.</p>'}<h3>Agregar tarea única al mes</h3><div class="grid2"><input id="oneName" placeholder="Ej: Certificado DGI"><input id="oneDue" type="date"><button class="full" onclick="addOne()">Agregar al mes</button></div><h3>Tareas recurrentes del cliente</h3>${recs.map(recHtml).join('')||'<p class="muted">Sin recurrentes.</p>'}<div class="grid2"><input id="recName" placeholder="Ej: IVA"><select id="recFreq"><option value="mensual">Mensual</option><option value="bimensual">Bimensual</option><option value="trimestral">Trimestral</option><option value="semestral">Semestral</option><option value="anual">Anual</option></select><input id="recDay" placeholder="Día vencimiento" type="number"><input id="recStart" type="month" value="${ymDate()}"><button class="full" onclick="addRec()">Agregar recurrente</button></div><h3>Honorarios del mes</h3><div class="payrow"><div><b>${fmtMoney(fee?.amount??c.fee_amount,fee?.currency||c.fee_currency)}</b><br><span class="muted">Pagado: ${fmtMoney(fee?.paid_amount||0,fee?.currency||c.fee_currency)} · Saldo: ${fmtMoney(due,fee?.currency||c.fee_currency)}</span></div><div class="actions"><input id="feeMonthAmount" type="number" value="${fee?.amount??c.fee_amount??0}" style="width:120px" title="Importe del mes"><button class="light" onclick="updateMonthFee()">Actualizar importe</button><input id="payAmt" type="number" placeholder="Pago parcial" style="width:130px"><button onclick="addPayment()">Agregar pago</button><button onclick="markPaid()">Marcar pagado</button><button class="light" onclick="markUnpaid()">Marcar pendiente</button><button class="danger" onclick="clearPayments()">Borrar pagos</button></div></div><h3>Editar cliente</h3><div class="grid2"><input id="editName" value="${c.name}"><input id="editType" value="${c.company_type||''}"><input id="editFee" type="number" value="${c.fee_amount||0}"><select id="editCurr"><option ${c.fee_currency==='$'?'selected':''}>$</option><option ${c.fee_currency==='USD'?'selected':''}>USD</option></select><button onclick="saveClient()">Guardar cambios</button><button class="danger" onclick="archiveClient()">Archivar cliente</button></div>`}
function taskHtml(t){return `<div class="task"><div><strong>${t.name}</strong><span class="due ${dueClass(t.due_date,t.status)}">Vence: ${t.due_date}</span></div><select onchange="setTask('${t.id}',this.value)">${statusCycle.map(s=>`<option value="${s}" ${t.status===s?'selected':''}>${statusEmoji[s]} ${statusLabel[s]}</option>`).join('')}</select><input value="${t.notes||''}" placeholder="Notas" onchange="noteTask('${t.id}',this.value)"><button class="danger" onclick="deleteTask('${t.id}')">Borrar solo este mes</button></div>`}
function recHtml(r){return `<div class="client"><strong>${r.name}</strong><div class="muted">${r.frequency} · vence día ${r.due_day||25} · desde ${r.start_month||'-'}</div><div class="actions" style="margin-top:8px"><input type="month" id="st_${r.id}" value="${r.start_month||ymDate()}"><button onclick="fixRec('${r.id}')">Corregir desde este mes</button><button class="danger" onclick="archiveRec('${r.id}')">Pausar</button></div></div>`}
function renderGeneral(){let taskNames=[...new Set(state.tasks.map(t=>t.name))].sort(); let html='<table><tr><th>Cliente</th>'+taskNames.map(n=>`<th>${n}</th>`).join('')+'<th>Pago</th></tr>'; for(const c of activeClients()){let fee=state.fees.find(f=>f.client_id===c.id);let due=fee?Math.max(0,Number(fee.amount||0)-Number(fee.paid_amount||0)):Number(c.fee_amount||0);html+=`<tr><td><b>${c.name}</b><div class="muted">${c.company_type||''}</div></td>`+taskNames.map(n=>{let t=state.tasks.find(t=>t.client_id===c.id&&t.name===n);return `<td class="status-cell" ${t?`onclick="cycleTask('${t.id}')"`:''}>${t?statusEmoji[t.status]:'-'}</td>`}).join('')+`<td>${due<=0?'🟢':fmtMoney(due,fee?.currency||c.fee_currency)}</td></tr>`} $('generalTable').innerHTML=html+'</table>'}
function renderArchived(){let arr=state.clients.filter(c=>c.archived);$('archivedList').innerHTML=arr.length?arr.map(c=>`<div class="client archived"><b>${c.name}</b><div class="muted">${c.company_type||''}</div><button onclick="restoreClient('${c.id}')">Restaurar</button></div>`).join(''):'<p class="muted">No hay clientes archivados.</p>'}
window.selectClient=id=>{state.selected=id;render()}
$('month').value=new Date().toISOString().slice(0,7);$('month').onchange=()=>load(true);$('genMonth').onclick=()=>generateMonth(true);
$('addClient').onclick=async()=>{await sb.from('clients').insert({name:$('newName').value,company_type:$('newType').value,fee_amount:Number($('newFee').value||0),fee_currency:$('newCurr').value,archived:false});$('newName').value='';await load()}
window.addOne=async()=>{let c=state.selected; await sb.from('monthly_tasks').insert({client_id:c,month:monthStart(),name:$('oneName').value,due_date:$('oneDue').value,status:'pendiente'}); await load()}
window.addRec=async()=>{await sb.from('recurring_tasks').insert({client_id:state.selected,name:$('recName').value,frequency:$('recFreq').value,due_day:Number($('recDay').value||25),start_month:$('recStart').value,archived:false}); await load(true)}
window.setTask=async(id,v)=>{await sb.from('monthly_tasks').update({status:v}).eq('id',id);await load()}
window.noteTask=async(id,v)=>{await sb.from('monthly_tasks').update({notes:v}).eq('id',id);await load()}
window.cycleTask=async(id)=>{let t=state.tasks.find(t=>t.id===id);let v=statusCycle[(statusCycle.indexOf(t.status)+1)%statusCycle.length];await window.setTask(id,v)}
window.deleteTask=async(id)=>{
  let t=state.tasks.find(x=>x.id===id);
  if(t?.recurring_task_id){
    await sb.from('deleted_monthly_tasks').upsert({client_id:t.client_id,recurring_task_id:t.recurring_task_id,month:monthStart(),task_name:t.name});
  }
  await sb.from('monthly_tasks').delete().eq('id',id);
  await load(false);
}
window.fixRec=async(id)=>{await sb.from('recurring_tasks').update({start_month:$('st_'+id).value}).eq('id',id);await load()}
window.archiveRec=async(id)=>{await sb.from('recurring_tasks').update({archived:true,archived_at:new Date().toISOString()}).eq('id',id);await load()}
window.archiveClient=async()=>{if(confirm('Archivar cliente? No se borra la información.')){await sb.from('clients').update({archived:true,archived_at:new Date().toISOString()}).eq('id',state.selected);state.selected=null;await load()}}
window.restoreClient=async(id)=>{await sb.from('clients').update({archived:false,archived_at:null}).eq('id',id);await load()}
window.saveClient=async()=>{
  const newFee=Number($('editFee').value||0);
  const newCurr=$('editCurr').value;
  await sb.from('clients').update({name:$('editName').value,company_type:$('editType').value,fee_amount:newFee,fee_currency:newCurr}).eq('id',state.selected);
  const fee=state.fees.find(f=>f.client_id===state.selected);
  if(fee && confirm('¿Actualizar también el honorario del mes actual con este nuevo importe?')){
    const paid=Number(fee.paid_amount||0);
    const status=paid<=0?'pendiente':(paid>=newFee?'pagado':'parcial');
    await sb.from('monthly_fees').update({amount:newFee,currency:newCurr,status}).eq('id',fee.id);
  }
  await load();
}
async function ensureFee(){let fee=state.fees.find(f=>f.client_id===state.selected);let c=state.clients.find(c=>c.id===state.selected); if(!fee){let ins=await sb.from('monthly_fees').insert({client_id:c.id,month:monthStart(),amount:c.fee_amount||0,currency:c.fee_currency||'$',paid_amount:0,status:'pendiente'}).select().single(); return ins.data} return fee}
window.addPayment=async()=>{let fee=await ensureFee();let paid=Number(fee.paid_amount||0)+Number($('payAmt').value||0);let status=paid>=Number(fee.amount||0)?'pagado':'parcial';await sb.from('monthly_fees').update({paid_amount:paid,status}).eq('id',fee.id);await load()}
window.markPaid=async()=>{let fee=await ensureFee();await sb.from('monthly_fees').update({paid_amount:fee.amount,status:'pagado'}).eq('id',fee.id);await load()}
window.updateMonthFee=async()=>{
  let fee=await ensureFee();
  const amount=Number($('feeMonthAmount').value||0);
  const c=state.clients.find(c=>c.id===state.selected);
  const paid=Number(fee.paid_amount||0);
  const status=paid<=0?'pendiente':(paid>=amount?'pagado':'parcial');
  await sb.from('monthly_fees').update({amount,currency:c?.fee_currency||fee.currency||'$',status}).eq('id',fee.id);
  await load();
}
window.markUnpaid=async()=>{
  let fee=await ensureFee();
  await sb.from('monthly_fees').update({paid_amount:0,status:'pendiente',paid_at:null}).eq('id',fee.id);
  await load();
}
window.clearPayments=async()=>{
  if(!confirm('¿Borrar los pagos cargados para este mes y dejar el honorario pendiente?')) return;
  let fee=await ensureFee();
  await sb.from('monthly_fees').update({paid_amount:0,status:'pendiente',paid_at:null}).eq('id',fee.id);
  await load();
}

let realtimeTimer=null;
function reloadSoon(autoGenerate=false){
  clearTimeout(realtimeTimer);
  realtimeTimer=setTimeout(()=>load(autoGenerate),350);
}
function setupRealtime(){
  sb.channel('calendario-clientes-realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:'clients'},()=>reloadSoon(true))
    .on('postgres_changes',{event:'*',schema:'public',table:'recurring_tasks'},()=>reloadSoon(true))
    .on('postgres_changes',{event:'*',schema:'public',table:'monthly_tasks'},()=>reloadSoon(false))
    .on('postgres_changes',{event:'*',schema:'public',table:'monthly_fees'},()=>reloadSoon(false))
    .on('postgres_changes',{event:'*',schema:'public',table:'deleted_monthly_tasks'},()=>reloadSoon(false))
    .subscribe();
}
setupRealtime();
load(true);
</script>
</body>
</html>
